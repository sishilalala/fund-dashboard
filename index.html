<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公募基金每日筛选</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./base.css">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet" href="./dashboard.css">
</head>
<body>
  <!-- Sticky Header -->
  <header class="dash-header">
    <div class="dash-header-inner">
      <div class="header-left">
        <div class="header-logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect x="2" y="16" width="5" height="10" rx="1" fill="var(--color-accent)"/>
            <rect x="9" y="10" width="5" height="16" rx="1" fill="var(--color-accent)" opacity="0.7"/>
            <rect x="16" y="6" width="5" height="20" rx="1" fill="var(--color-accent)" opacity="0.5"/>
            <rect x="23" y="2" width="5" height="24" rx="1" fill="var(--color-accent)" opacity="0.35"/>
          </svg>
        </div>
        <div class="header-title-group">
          <h1 class="header-title">公募基金每日筛选</h1>
          <span class="header-date" id="tradingDate"></span>
        </div>
      </div>
      <div class="header-right">
        <span class="header-update" id="updateTime"></span>
        <button class="theme-btn" data-theme-toggle aria-label="切换主题">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Time Info Bar -->
  <div class="time-bar">
    <div class="time-bar-inner">
      <div class="time-item">
        <span class="time-label">最后更新</span>
        <span class="time-value" id="lastUpdate">—</span>
      </div>
      <div class="time-sep"></div>
      <div class="time-item">
        <span class="time-label">下次更新</span>
        <span class="time-value" id="nextUpdate">—</span>
      </div>
    </div>
  </div>

  <!-- Main scrollable area -->
  <main class="dash-main" id="dashMain">

    <!-- Section 1: Market Overview -->
    <section class="section" id="sectionMarket">
      <h2 class="section-heading">A股市场总览</h2>

      <!-- Index Cards -->
      <div class="index-cards" id="indexCards"></div>

      <!-- Industry Heatmap -->
      <div class="subsection">
        <h3 class="subsection-heading">行业板块热力图</h3>
        <div class="heatmap-container" id="heatmapContainer"></div>
      </div>

      <!-- Fund Flow -->
      <div class="subsection">
        <h3 class="subsection-heading">资金流向</h3>
        <div class="table-wrap">
          <table class="flow-table" id="flowTable">
            <thead>
              <tr>
                <th>日期</th>
                <th>主力净流入</th>
                <th>超大单净流入</th>
                <th>大单净流入</th>
                <th>中单净流入</th>
                <th>小单净流入</th>
              </tr>
            </thead>
            <tbody id="flowBody"></tbody>
          </table>
        </div>
      </div>
    </section>

    <!-- Section 2: Fund Rankings -->
    <section class="section" id="sectionFunds">
      <h2 class="section-heading">基金排行榜</h2>

      <!-- Tab Nav -->
      <div class="tab-nav" id="tabNav">
        <button class="tab-btn active" data-tab="top50">综合Top50</button>
        <button class="tab-btn" data-tab="股票型">股票型</button>
        <button class="tab-btn" data-tab="混合型">混合型</button>
        <button class="tab-btn" data-tab="债券型">债券型</button>
        <button class="tab-btn" data-tab="指数型">指数型</button>
        <button class="tab-btn" data-tab="QDII">QDII</button>
        <button class="tab-btn" data-tab="FOF">FOF</button>
      </div>

      <!-- Fund Table -->
      <div class="table-wrap">
        <table class="fund-table" id="fundTable">
          <thead>
            <tr>
              <th class="col-rank">排名</th>
              <th class="col-code">基金代码</th>
              <th class="col-name">基金简称</th>
              <th class="col-type">类型</th>
              <th class="col-pct sortable sorted-desc" data-sort="daily_return">日涨幅 <span class="sort-arrow">▼</span></th>
              <th class="col-pct sortable" data-sort="week_1">近1周 <span class="sort-arrow"></span></th>
              <th class="col-pct sortable" data-sort="month_1">近1月 <span class="sort-arrow"></span></th>
              <th class="col-pct sortable" data-sort="month_3">近3月 <span class="sort-arrow"></span></th>
              <th class="col-pct sortable" data-sort="month_6">近6月 <span class="sort-arrow"></span></th>
              <th class="col-pct sortable" data-sort="year_1">近1年 <span class="sort-arrow"></span></th>
              <th class="col-pct sortable" data-sort="ytd">今年来 <span class="sort-arrow"></span></th>
              <th class="col-fee">手续费</th>
            </tr>
          </thead>
          <tbody id="fundBody"></tbody>
        </table>
      </div>
    </section>

    <!-- Section 3: Insights -->
    <section class="section" id="sectionInsights">
      <h2 class="section-heading">选基参考</h2>
      <div class="insights-grid" id="insightsGrid"></div>
    </section>

  </main>

  <script src="./data-market.js"></script>
  <script src="./data-top-funds.js"></script>
  <script src="./data-cat1.js"></script>
  <script src="./data-cat2.js"></script>
  <script src="./data-meta.js"></script>
  <script>
    // Merge chunked data into single FUND_DATA object
    const FUND_DATA = {
      ...FUND_DATA_MARKET,
      ...FUND_DATA_TOP,
      category_funds: { ...FUND_DATA_CAT1, ...FUND_DATA_CAT2 },
      ...FUND_DATA_META
    };
  </script>
  <script src="./app.js"></script>
</body>
</html>
