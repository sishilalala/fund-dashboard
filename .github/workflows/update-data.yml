name: Daily Fund Data Update

on:
  schedule:
    # \u6bcf\u4e2a\u5de5\u4f5c\u65e5\u5317\u4eac\u65f6\u95f4 16:30 (UTC 08:30) \u8fd0\u884c
    - cron: '30 8 * * 1-5'
  workflow_dispatch: # \u5141\u8bb8\u624b\u52a8\u89e6\u53d1

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install akshare pandas requests

      - name: Fetch latest fund data
        run: python scripts/update_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-market.js data-top-funds.js data-cat1.js data-cat2.js data-meta.js data-news.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "\u1f4ca \u66f4\u65b0\u57fa\u91d1\u6570\u636e $(date -u +%Y-%m-%d)"
            git push
          fi
