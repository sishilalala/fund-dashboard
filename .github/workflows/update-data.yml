name: Daily Fund Data Update

on:
  schedule:
    # 每个工作日北京时间 16:30 (UTC 08:30) 运行
    - cron: '30 8 * * 1-5'
  workflow_dispatch: # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install akshare pandas requests

      - name: Fetch latest fund data
        run: python scripts/update_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-market.js data-top-funds.js data-cat1.js data-cat2.js data-meta.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📊 更新基金数据 $(date -u +%Y-%m-%d)"
            git push
          fi
